name: lstm_5g_traffic

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  # PyTorch with CUDA 12.8 (RTX 5070 / Blackwell support)
  - pytorch>=2.5
  - torchvision>=0.20
  - torchaudio>=2.5
  - pytorch-cuda=12.8
  # Scientific computing
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - scikit-learn>=1.3
  - statsmodels>=0.14
  # Visualisation
  - matplotlib>=3.7
  - pip:
      - torch>=2.5
      - numpy>=1.24
      - scipy>=1.11
      - matplotlib>=3.7
      - scikit-learn>=1.3
      - pandas>=2.0
      - statsmodels>=0.14
