name: lstm_5g_traffic

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  # PyTorch with CUDA 11.8
  - pytorch=2.0.1
  - torchvision=0.15.2
  - torchaudio=2.0.2
  - pytorch-cuda=11.8
  # Scientific computing
  - numpy=1.24.3
  - scipy=1.11.1
  - pandas=2.0.3
  - scikit-learn=1.3.0
  - statsmodels=0.14.0
  # Visualisation
  - matplotlib=3.7.2
  - pip:
      - torch>=2.0
      - numpy>=1.23
      - scipy>=1.9
      - matplotlib>=3.6
      - scikit-learn>=1.2
      - pandas>=1.5
      - statsmodels>=0.14
